version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: macromint
      POSTGRES_PASSWORD: macromint
      POSTGRES_DB: macromint
    ports:
      - "5432:5432"
    volumes:
      - macromint_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - macromint_redis:/data

volumes:
  macromint_pg:
  macromint_redis:
