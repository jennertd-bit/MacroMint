<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>MacroMint | Reset Password</title>
    <meta name="theme-color" content="#10b981" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="reset.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <div class="logo">MM</div>
          <div>
            <h1>MacroMint</h1>
            <p>Password reset</p>
          </div>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Reset</p>
              <h3>Set a new password</h3>
              <p class="muted" id="reset-message">Enter a new password below.</p>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-field">
              <label for="reset-password">New password</label>
              <div class="pw-wrap">
                <input id="reset-password" type="password" placeholder="••••••••" />
                <button type="button" class="pw-toggle" data-target="reset-password" aria-label="Show password">
                  <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <div class="form-field">
              <label for="reset-confirm">Confirm password</label>
              <div class="pw-wrap">
                <input id="reset-confirm" type="password" placeholder="••••••••" />
                <button type="button" class="pw-toggle" data-target="reset-confirm" aria-label="Show password">
                  <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="auth-actions">
            <button id="reset-submit" class="button" type="button">Update password</button>
            <p class="help" id="reset-help"></p>
          </div>
        </section>
      </main>
    </div>
    <script>
      document.querySelectorAll('.pw-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.querySelector('.eye-icon').style.display = show ? 'none' : '';
          btn.querySelector('.eye-off-icon').style.display = show ? '' : 'none';
          btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
        });
      });
    </script>
  </body>
</html>
