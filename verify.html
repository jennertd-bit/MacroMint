<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>MacroMint | Verify Email</title>
    <meta name="theme-color" content="#10b981" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script src="verify.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <div class="logo">MM</div>
          <div>
            <h1>MacroMint</h1>
            <p>Email verification</p>
          </div>
        </div>
      </header>

      <main>
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Verify</p>
              <h3 id="verify-title">Checking your link...</h3>
              <p class="muted" id="verify-message">Please wait while we verify your email.</p>
            </div>
          </div>
          <div class="auth-actions">
            <a class="button" href="index.html">Back to MacroMint</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
